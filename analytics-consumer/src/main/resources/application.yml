server:
  port: ${PORT:8081}

spring:
  application:
    name: analytics-consumer

  # ─── PostgreSQL ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: shortener
    password: shortener_secret_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true

  # ─── Kafka Consumer ─────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analytics-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.urlshortener.*"
        spring.json.type.mapping: "clickEvent:com.urlshortener.analytics.model.ClickEvent"
      max-poll-records: 100

# ─── Application Config ──────────────────────────────
app:
  kafka:
    click-topic: url-clicks
  batch:
    size: 50
    flush-interval-ms: 5000

# ─── Logging ──────────────────────────────────────────
logging:
  level:
    com.urlshortener: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── Actuator ─────────────────────────────────────────
management:
  health:
    db:
      enabled: false
    kafka:
      enabled: false
    redis:
      enabled: false
