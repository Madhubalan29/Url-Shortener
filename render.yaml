services:
  - type: web
    name: url-shortener-api
    env: docker
    dockerContext: ./shortener-service
    dockerfilePath: ./shortener-service/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATA_REDIS_HOST
        sync: false
      - key: SPRING_DATA_REDIS_PORT
        sync: false
      - key: SPRING_DATA_REDIS_PASSWORD
        sync: false
      - key: SPRING_DATA_REDIS_SSL
        value: "true"
      - key: SPRING_KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
        value: "SASL_SSL"
      - key: SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
        value: "SCRAM-SHA-256"
      - key: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
        sync: false
      - key: APP_BASE_URL
        sync: false

  - type: web
    name: url-shortener-analytics
    env: docker
    dockerContext: ./analytics-consumer
    dockerfilePath: ./analytics-consumer/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_KAFKA_BOOTSTRAP_SERVERS
        sync: false
      - key: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
        value: "SASL_SSL"
      - key: SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
        value: "SCRAM-SHA-256"
      - key: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
        sync: false
